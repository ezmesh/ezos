; PlatformIO Configuration for T-Deck Plus MeshCore Firmware
; Target: LilyGo T-Deck Plus (ESP32-S3)

[platformio]
default_envs = t-deck-plus

; Common build flags shared by all environments
[common]
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    ; loopTask stack trimmed from 16 KiB to 10 KiB to free internal DRAM.
    ; WiFi's TCP/IP stack pulls hard from DMA-capable DRAM during a
    ; fetch and LCD alpha-blend draws need ~1.3 KiB DMA per row -- too
    ; little free and the line-buffer alloc returns null, null-derefs
    ; in LovyanGFX and crashes Core 1. 10 KiB sits comfortably above
    ; the actual loop high-water (Lua + render).
    -DARDUINO_LOOP_STACK_SIZE=10240
    ; AsyncTCP's worker task. Default 8 KiB is wasteful — our request
    ; handlers are tiny and the per-request stack frames stay shallow,
    ; so 4 KiB lands well above high-water with room to spare.
    -DCONFIG_ASYNC_TCP_STACK_SIZE=4096
    -std=gnu++17
    -Wno-unused-variable
    -Wno-unused-function

[env:t-deck-plus]
custom_version = 0.2.0
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 921600
upload_speed = 460800
upload_protocol = esptool

; T-Deck Plus has 16MB Flash, 8MB OPI PSRAM
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.psram_type = opi

; Enable OPI PSRAM (8MB) - qio_opi = QIO flash + OPI PSRAM
board_build.arduino.memory_type = qio_opi

; USB CDC for serial output over USB
; PSRAM must be explicitly enabled for ESP32-S3
; Increase loop task stack size (default 8192 is too small with HTTP + Lua coroutines)
build_flags =
    ${common.build_flags}
    -I.pio/libdeps/${this.__env__}/Esp32Lua/src/lua

build_unflags = -std=gnu++11

lib_deps =
    lovyan03/LovyanGFX@^1.1.12
    jgromes/RadioLib@^6.6.0
    bblanchon/ArduinoJson@^7.0.0
    fischer-simon/Esp32Lua@^5.4.7
    rweather/Crypto@^0.4.0
    SD
    mikalhart/TinyGPSPlus@^1.0.3
    https://github.com/pschatzmann/arduino-libhelix.git
    ; AsyncTCP + ESPAsyncWebServer drive the dev OTA server and
    ; ez.http.serve_start. We tried ESP-IDF's esp_http_server first,
    ; but on Arduino-ESP32 2.0.17 / IDF 4.4.x its BSD-socket send
    ; path silently stalls multi-segment responses on this hardware:
    ; lwip_send queues bytes into the 5760-byte TCP send buffer and
    ; reports success, but only the first segment ever reaches the
    ; wire and the WiFi TX queue gets stuck. AsyncTCP uses lwIP's
    ; raw TCP API (tcp_write + tcp_sent callback) inside the lwIP
    ; task itself, which exercises the same stack but bypasses the
    ; broken socket layer and reliably delivers the full body.
    mathieucarbou/AsyncTCP@^3.3.2
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    ; Bitbank's tiny JPEG + PNG encoders. Decoders live in LovyanGFX
    ; (TJpgDec) but it has no encoder; these libs are RGB565-aware
    ; and run in <100 ms for a 320x240 frame at quality 80, so paint
    ; can save a canvas and the wallpaper loader can accept user-
    ; supplied PNGs.
    bitbank2/JPEGENC@^1.1.0
    bitbank2/PNGenc@^1.4.0

; LittleFS for user data storage (not Lua scripts - those are embedded in firmware)
board_build.filesystem = littlefs

; Data partition for user data
board_build.partitions = partitions_16MB.csv

; Pre-build hooks. Order matters: patches first (they edit the just-
; installed library sources), then Lua embedder (generates the C array
; that gets compiled into firmware).
extra_scripts =
    pre:tools/patches/apply_patches.py
    pre:scripts/embed_lua_scripts.py

; =============================================================================
; SD Card Build - Firmware without embedded scripts (scripts loaded from SD)
; =============================================================================
[env:t-deck-plus-sdcard]
extends = env:t-deck-plus

; Define flag to skip embedding and use inline null implementations
build_flags =
    ${common.build_flags}
    -I.pio/libdeps/${this.__env__}/Esp32Lua/src/lua
    -DNO_EMBEDDED_SCRIPTS
